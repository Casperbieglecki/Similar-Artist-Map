# Render Blueprint for the Artist Map backend (FastAPI).
# In Render: New + → Blueprint → connect this repo. It reads this file.
services:
  - type: web
    name: artist-map-api
    runtime: python
    rootDir: backend
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /api/health
    envVars:
      # Set the actual value in the Render dashboard — never commit the key.
      - key: LASTFM_API_KEY
        sync: false
